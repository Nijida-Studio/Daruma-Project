odts:
  version: "1.9.5"

issue_metadata:
  version:
    id: odts_version
    label: ODTS Version
    source: odts.version
    preserve_existing: true

repository_feedback:
  custom_property:
    name: ODTS Status
    required: false
    source: derived

labels:
  source: .github/labels.json
  synchronization_workflow: .github/workflows/odts-labels.yml
  project_specific_additions_allowed: true
